<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Me Guia Viagens</title>
    <link rel="icon" href="../logo.png" type="image/png">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0F2460 0%, #1B3A8C 50%, #E8B84B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.25);
            text-align: center;
        }
        .logo-wrap {
            width: 80px; height: 80px;
            border-radius: 16px; overflow: hidden;
            background: #f0f4ff;
            border: 3px solid #1B3A8C;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }
        .logo-wrap img { width: 74px; height: 74px; object-fit: contain; }
        h1 { font-size: 1.5rem; color: #1B3A8C; margin-bottom: 4px; font-weight: 700; }
        .sub { color: #6B7280; font-size: .9rem; margin-bottom: 32px; }
        .field { text-align: left; margin-bottom: 18px; }
        .field label { display: block; font-size: .85rem; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .field input {
            width: 100%; padding: 12px 16px;
            border: 1.5px solid #E5E7EB; border-radius: 10px;
            font-size: 1rem; outline: none; transition: border .2s;
        }
        .field input:focus { border-color: #1B3A8C; }
        .btn-login {
            width: 100%; padding: 14px;
            background: #1B3A8C; color: white;
            border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: background .2s;
            margin-top: 8px;
        }
        .btn-login:hover { background: #0F2460; }
        .error {
            background: #FEE2E2; color: #B91C1C;
            padding: 12px; border-radius: 10px;
            font-size: .9rem; margin-bottom: 16px;
            display: none;
        }
        .back { margin-top: 20px; }
        .back a { color: #6B7280; font-size: .85rem; text-decoration: none; }
        .back a:hover { color: #1B3A8C; }
        .hint {
            background: #F0F9FF; border: 1px solid #BAE6FD;
            border-radius: 10px; padding: 12px 16px;
            font-size: .8rem; color: #0369A1;
            text-align: left; margin-bottom: 20px;
        }
        .hint strong { display: block; margin-bottom: 4px; }
        @media(max-width:480px) {
            body { align-items: flex-start; padding: 20px 16px; }
            .card { padding: 32px 22px; border-radius: 18px; }
            h1 { font-size: 1.3rem; }
            .field input { font-size: 16px; } /* evita zoom no iOS */
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo-wrap">
        <img src="../logo.png" alt="Me Guia Viagens">
    </div>
    <h1>Área do Editor</h1>
    <p class="sub">Me Guia Viagens — Painel de Edição do Site</p>

    <div class="hint">
        <strong>🔐 Acesso restrito</strong>
        Use as credenciais de administrador para entrar no modo de edição.
    </div>

    <div class="error" id="error-msg">
        <i class="fa-solid fa-circle-exclamation"></i> Email ou senha incorretos.
    </div>

    <form id="login-form">
        <div class="field">
            <label>Email</label>
            <input type="email" id="email" placeholder="admin@meguiaviagens.com.br" required autocomplete="username">
        </div>
        <div class="field">
            <label>Senha</label>
            <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">
            <i class="fa-solid fa-lock-open"></i> Entrar no Editor
        </button>
    </form>

    <div class="back">
        <a href="../index.html">← Voltar ao site</a>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim().toLowerCase();
        const senha = document.getElementById('senha').value;
        const btn = e.target.querySelector('button');
        const errEl = document.getElementById('error-msg');

        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verificando...';
        btn.disabled = true;
        errEl.style.display = 'none';

        if (email !== 'admin@meguiaviagens.com.br') {
            errEl.style.display = 'block';
            btn.innerHTML = '<i class="fa-solid fa-lock-open"></i> Entrar no Editor';
            btn.disabled = false;
            return;
        }

        try {
            const res = await fetch('../api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ secret: senha })
            });
            const data = await res.json();

            if (data.ok) {
                const authData = JSON.stringify({
                    email,
                    ts: Date.now(),
                    expires: Date.now() + (8 * 60 * 60 * 1000)
                });
                sessionStorage.setItem('lovisa_auth', authData);
                sessionStorage.setItem('lovisa_secret', senha);
                localStorage.setItem('lovisa_auth', authData);
                localStorage.setItem('lovisa_secret', senha);
                window.location.href = '../index.html?editor=1';
            } else {
                errEl.style.display = 'block';
                btn.innerHTML = '<i class="fa-solid fa-lock-open"></i> Entrar no Editor';
                btn.disabled = false;
            }
        } catch {
            errEl.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Erro de conexão. Tente novamente.';
            errEl.style.display = 'block';
            btn.innerHTML = '<i class="fa-solid fa-lock-open"></i> Entrar no Editor';
            btn.disabled = false;
        }
    });

    const auth = JSON.parse(sessionStorage.getItem('lovisa_auth') || localStorage.getItem('lovisa_auth') || 'null');
    if (auth && auth.expires > Date.now()) {
        window.location.href = '../index.html?editor=1';
    }
</script>
</body>
</html>
